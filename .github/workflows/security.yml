name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-audit: a dependency that was clean at merge time can have a
    # CVE published later. Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - name: Audit locked production dependencies against known CVEs
        run: |
          uv export --no-dev --format requirements-txt --no-emit-project -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt --disable-pip --strict

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    # Dependabot PRs run with a read-only GITHUB_TOKEN, which gitleaks-action
    # cannot use to scan a pull request (it 403s on the commits API). Those PRs
    # only bump dependency versions and can't introduce secrets, and every
    # commit that lands on main is still scanned by the push-triggered run
    # above — so skip the PR scan for Dependabot rather than fail it.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write   # let gitleaks annotate findings on human PRs
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # scan full history, not just the latest commit
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
