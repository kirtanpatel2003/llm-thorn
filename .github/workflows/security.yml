name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-audit: a dependency that was clean at merge time can have a
    # CVE published later. Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - name: Audit locked production dependencies against known CVEs
        run: |
          uv export --no-dev --format requirements-txt --no-emit-project -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt --disable-pip --strict

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history, not just the latest commit
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
